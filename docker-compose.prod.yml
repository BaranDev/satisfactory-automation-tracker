# Dokploy Production Compose - Use with RustFS
# NOTE: This does NOT include MinIO. Configure RustFS separately in Dokploy
# and set the S3_* environment variables on the backend service.

services:
  # Backend - FastAPI
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # These should be overridden in Dokploy with actual RustFS credentials
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-satisfactory-tracker}
      ASSETS_BUCKET: ${ASSETS_BUCKET:-satisfactory-assets}
      ASSETS_BASE_URL: ${ASSETS_BASE_URL:-http://localhost:9000/satisfactory-assets}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend - React/Vite (production nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
