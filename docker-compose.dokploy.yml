services:
  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      S3_ENDPOINT: http://host.docker.internal:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-changeme}
      S3_BUCKET: ${S3_BUCKET:-satisfactory-tracker}
      ASSETS_BUCKET: ${ASSETS_BUCKET:-satisfactory-assets}
      ASSETS_BASE_URL: ${ASSETS_BASE_URL:-https://s3.cevdetbaran.com/satisfactory-assets}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://sap.cevdetbaran.com}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  dokploy-network:
    external: true