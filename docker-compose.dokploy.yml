# docker-compose.dokploy.yml
services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      S3_ENDPOINT: https://s3.cevdetbaran.com
      S3_ACCESS_KEY: rustfsadmin
      S3_SECRET_KEY: fwpoimghzqbbo6yo
      S3_BUCKET: satisfactory-tracker
      ASSETS_BUCKET: satisfactory-assets
      ASSETS_BASE_URL: https://s3.cevdetbaran.com/satisfactory-assets
      CORS_ORIGINS: https://sap.cevdetbaran.com
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy